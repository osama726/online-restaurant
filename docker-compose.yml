services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: restaurant-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
    networks:
      - restaurant-network

  nginx:
    image: nginx:alpine
    container_name: restaurant-nginx
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - restaurant-network

  mysql:
    image: mysql:8.4
    container_name: restaurant-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: restaurant
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - restaurant-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: restaurant-pma
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - restaurant-network

volumes:
  mysql_data:

networks:
  restaurant-network:
